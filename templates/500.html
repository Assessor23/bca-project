<!DOCTYPE html>
<html>
<head>
    <title>Server Error</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .error-container {
            text-align: center;
            color: white;
        }
        .error-container h1 {
            font-size: 5em;
            margin: 0;
        }
        .error-container p {
            font-size: 1.5em;
            margin: 1rem 0;
        }
        .error-container a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>500</h1>
        <p>Internal Server Error</p>
        <a href="/">Go Home</a>
    </div>
</body>
</html>
